<div class="w-full overflow-auto whitespace-nowrap">
  <table class="caption-bottom border-b border-gray-200 dark:border-gray-800">
    <thead class="bg-gray-50 dark:bg-gray-800">
      @for (headerGroup of table.getHeaderGroups(); track headerGroup.id) {
        <tr>
          @for (header of headerGroup.headers; track header.id) {
            @if (!header.isPlaceholder) {
              <th class="border-b px-4 py-3.5 text-left text-sm font-semibold text-gray-900 dark:text-gray-50 border-gray-200 dark:border-gray-800">
                <ng-container
                  *flexRender="
                    header.column.columnDef.header;
                    props: header.getContext();
                    let header
                  "
                >
                  <div [innerHTML]="header"></div>
                </ng-container>
              </th>
            }
          }
        </tr>
      }
    </thead>
    <tbody class="divide-y divide-gray-200 dark:divide-gray-800 overflow-auto">
      @for (row of table.getRowModel().rows; track row.id) {
        <tr class="[&_td:last-child]:pr-4 [&_th:last-child]:pr-4 [&_td:first-child]:pl-4 [&_th:first-child]:pl-4">
          @for (cell of row.getVisibleCells(); track cell.id) {
            <td>
              <ng-container
                *flexRender="
                  cell.column.columnDef.cell;
                  props: cell.getContext();
                  let cell
                "
              >
                <div class="p-3 text-sm text-gray-600 dark:text-gray-400" [innerHTML]="cell"></div>
              </ng-container>
            </td>
          }
        </tr>
      }
    </tbody>

  </table>
</div>
